name: pytest-unit-contract

on:
  pull_request:
  push:
    branches:
      - main
      - master
      - develop
      - test_pytest
  workflow_dispatch:

jobs:
  pytest-unit-contract:
    runs-on: macos-15
    env:
      PYTHONUNBUFFERED: "1"
      HF_HUB_OFFLINE: "1"
      TRANSFORMERS_OFFLINE: "1"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: requirements-test.txt

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install test dependencies
        run: python -m pip install -r requirements-test.txt

      - name: Run unit/contract pytest suite
        run: pytest -q tests/unit_contract
